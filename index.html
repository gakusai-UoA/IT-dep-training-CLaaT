      width: 90%;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));

    .card {

      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
    }

    .card h2 {
      margin: 0 0 0.5rem;
      font-size: 1.25rem;
      font-weight: 600;
    }

    .card a {
      color: inherit;
      text-decoration: none;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .header h1 {
      margin: 0;
      font-size: 2rem;
      font-weight: 700;
